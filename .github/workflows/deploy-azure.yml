name: Deploy to Azure VM

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: chatwoot
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN
          script_stop: true
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u nicoariffo-somossena --password-stdin
            cd /home/chatwoot/chatwoot-sena
            git pull origin main
            docker compose -f docker-compose.production.yaml pull
            docker compose -f docker-compose.production.yaml run --rm rails bundle exec rails db:chatwoot_prepare
            docker compose -f docker-compose.production.yaml up -d --remove-orphans
            docker image prune -f
